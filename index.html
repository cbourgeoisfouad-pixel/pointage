<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pointage">
<meta name="theme-color" content="#1f2937">
<title>Pointage</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --ink: #111827;
    --muted: #6b7280;
    --line: #e5e7eb;
    --present: #16a34a;
    --present-bg: #dcfce7;
    --retard: #d97706;
    --retard-bg: #fef3c7;
    --absent: #dc2626;
    --absent-bg: #fee2e2;
    --primary: #2563eb;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: contain;
  }

  /* ---- En-tête ---- */
  header {
    position: sticky; top: 0; z-index: 10;
    background: #1f2937; color: #fff;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-top h1 { font-size: 18px; margin: 0; font-weight: 700; }
  .date { font-size: 13px; color: #cbd5e1; margin-top: 2px; text-transform: capitalize; }
  .icon-btn {
    background: rgba(255,255,255,.12); border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 10px; font-size: 20px;
    display: grid; place-items: center; cursor: pointer;
  }
  .icon-btn:active { background: rgba(255,255,255,.25); }

  /* ---- Bascule matin / soir ---- */
  .seg {
    display: flex; background: rgba(255,255,255,.12);
    border-radius: 12px; padding: 4px; margin-top: 14px; gap: 4px;
  }
  .seg button {
    flex: 1; border: none; background: transparent; color: #cbd5e1;
    padding: 9px 0; border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .seg button.active { background: #fff; color: #111827; }

  /* ---- Résumé compteurs ---- */
  .summary {
    display: flex; gap: 8px; padding: 12px 16px 4px; font-size: 13px; font-weight: 600;
  }
  .chip { padding: 5px 10px; border-radius: 999px; display: flex; align-items: center; gap: 5px; }
  .chip.p { background: var(--present-bg); color: var(--present); }
  .chip.r { background: var(--retard-bg); color: var(--retard); }
  .chip.a { background: var(--absent-bg); color: var(--absent); }
  .chip.u { background: #e5e7eb; color: var(--muted); }

  /* ---- Liste ---- */
  main { padding: 8px 12px calc(28px + var(--safe-bottom)); }
  .person {
    background: var(--card); border-radius: 14px; padding: 12px;
    margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  .person .name { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .actions button {
    border: 1.5px solid var(--line); background: #fff; color: var(--muted);
    padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform .05s;
  }
  .actions button:active { transform: scale(.96); }
  .actions button.sel.present { background: var(--present); border-color: var(--present); color: #fff; }
  .actions button.sel.retard { background: var(--retard); border-color: var(--retard); color: #fff; }
  .actions button.sel.absent { background: var(--absent); border-color: var(--absent); color: #fff; }

  /* ---- Etat vide ---- */
  .empty { text-align: center; color: var(--muted); padding: 60px 24px; }
  .empty p { line-height: 1.5; }
  .btn-primary {
    background: var(--primary); color: #fff; border: none; border-radius: 12px;
    padding: 14px 22px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
  }

  /* ---- Vues secondaires (réglages / historique) ---- */
  .screen { display: none; }
  .screen.show { display: block; }
  #home.screen { display: block; }
  #home.screen.hide { display: none; }

  .sub-head {
    position: sticky; top: 0; z-index: 10; background: #1f2937; color: #fff;
    padding: calc(var(--safe-top) + 12px) 12px 12px; display: flex; align-items: center; gap: 10px;
  }
  .sub-head h2 { font-size: 18px; margin: 0; font-weight: 700; flex: 1; }

  .settings-list { padding: 12px; }
  .emp-row {
    display: flex; align-items: center; gap: 10px; background: var(--card);
    border-radius: 12px; padding: 8px 10px; margin-bottom: 8px;
  }
  .emp-row input {
    flex: 1; border: none; font-size: 16px; padding: 8px; background: transparent; color: var(--ink);
  }
  .emp-row input:focus { outline: none; background: #f9fafb; border-radius: 8px; }
  .del-btn {
    background: var(--absent-bg); color: var(--absent); border: none;
    width: 38px; height: 38px; border-radius: 9px; font-size: 18px; cursor: pointer; flex: none;
  }
  .add-row {
    display: flex; gap: 8px; padding: 4px 12px 16px;
  }
  .add-row input {
    flex: 1; border: 1.5px solid var(--line); border-radius: 12px; padding: 13px; font-size: 16px;
  }
  .add-row input:focus { outline: none; border-color: var(--primary); }
  .add-btn {
    background: var(--primary); color: #fff; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 24px; font-weight: 700; cursor: pointer;
  }

  /* ---- Historique ---- */
  .hist-day {
    background: var(--card); border-radius: 12px; padding: 14px; margin: 0 12px 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  }
  .hist-day .d { font-size: 16px; font-weight: 600; text-transform: capitalize; }
  .hist-day .mini { display: flex; gap: 6px; margin-top: 6px; font-size: 12px; }
  .hist-day .mini span { padding: 2px 7px; border-radius: 999px; font-weight: 700; }
  .toolbar { padding: 12px; }
  .btn-export {
    width: 100%; background: #047857; color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .hint { color: var(--muted); font-size: 13px; text-align: center; padding: 4px 24px 20px; line-height: 1.5; }

  .detail-slot { padding: 4px 12px; }
  .detail-slot h3 { font-size: 14px; color: var(--muted); margin: 16px 4px 8px; text-transform: uppercase; letter-spacing: .5px; }
  .detail-row {
    display: flex; justify-content: space-between; align-items: center; background: var(--card);
    border-radius: 10px; padding: 12px; margin-bottom: 6px;
  }
  .badge { padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; }
  .badge.present { background: var(--present-bg); color: var(--present); }
  .badge.retard { background: var(--retard-bg); color: var(--retard); }
  .badge.absent { background: var(--absent-bg); color: var(--absent); }
  .badge.none { background: #e5e7eb; color: var(--muted); }
</style>
</head>
<body>

<!-- ============ ACCUEIL ============ -->
<div id="home" class="screen">
  <header>
    <div class="header-top">
      <div>
        <h1>Pointage</h1>
        <div class="date" id="todayLabel"></div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" onclick="showHistory()" title="Historique">🗓</button>
        <button class="icon-btn" onclick="showSettings()" title="Réglages">⚙️</button>
      </div>
    </div>
    <div class="seg">
      <button id="segMatin" class="active" onclick="setSlot('matin')">☀️ Matin</button>
      <button id="segSoir" onclick="setSlot('soir')">🌙 Soir</button>
    </div>
  </header>
  <div class="summary" id="summary"></div>
  <main id="list"></main>
</div>

<!-- ============ RÉGLAGES ============ -->
<div id="settings" class="screen">
  <div class="sub-head">
    <button class="icon-btn" onclick="showHome()">‹</button>
    <h2>Les salariés</h2>
  </div>
  <div class="settings-list" id="empList"></div>
  <div class="add-row">
    <input id="newEmp" type="text" placeholder="Nom du salarié" autocomplete="off">
    <button class="add-btn" onclick="addEmp()">+</button>
  </div>
  <p class="hint">Touche un nom pour le modifier. Les pointages déjà enregistrés ne sont pas effacés si tu supprimes quelqu'un.</p>
</div>

<!-- ============ HISTORIQUE ============ -->
<div id="history" class="screen">
  <div class="sub-head">
    <button class="icon-btn" onclick="showHome()">‹</button>
    <h2>Historique</h2>
  </div>
  <div class="toolbar">
    <button class="btn-export" onclick="exportCSV()">⬇️ Exporter en Excel (CSV)</button>
  </div>
  <div id="histList"></div>
  <p class="hint" id="histHint"></p>
</div>

<!-- ============ DÉTAIL D'UN JOUR ============ -->
<div id="detail" class="screen">
  <div class="sub-head">
    <button class="icon-btn" onclick="showHistory()">‹</button>
    <h2 id="detailTitle">Détail</h2>
  </div>
  <div class="detail-slot" id="detailBody"></div>
</div>

<script>
/* =========================================================
   Stockage : tout est gardé sur le téléphone (localStorage)
   - employees : [{ id, name }]
   - records   : { "AAAA-MM-JJ": { matin: {empId: statut}, soir: {...} } }
   statut = "present" | "retard" | "absent"
   ========================================================= */
const STORE_EMP = "pointage_employees";
const STORE_REC = "pointage_records";

let employees = load(STORE_EMP, []);
let records   = load(STORE_REC, {});
let currentSlot = "matin";

function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
  catch { return fallback; }
}
function save() {
  localStorage.setItem(STORE_EMP, JSON.stringify(employees));
  localStorage.setItem(STORE_REC, JSON.stringify(records));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ---- Dates ---- */
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function frDate(key) {
  const [y,m,d] = key.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}

/* ---- Accès aux pointages du jour ---- */
function dayRec(key) {
  if (!records[key]) records[key] = { matin: {}, soir: {} };
  if (!records[key].matin) records[key].matin = {};
  if (!records[key].soir)  records[key].soir = {};
  return records[key];
}

/* =========================================================
   ÉCRAN ACCUEIL
   ========================================================= */
function setSlot(slot) {
  currentSlot = slot;
  document.getElementById("segMatin").classList.toggle("active", slot==="matin");
  document.getElementById("segSoir").classList.toggle("active", slot==="soir");
  renderHome();
}

function mark(empId, status) {
  const rec = dayRec(todayKey())[currentSlot];
  rec[empId] = (rec[empId] === status) ? undefined : status; // re-toucher = annuler
  if (rec[empId] === undefined) delete rec[empId];
  save();
  renderHome();
}

function renderHome() {
  document.getElementById("todayLabel").textContent = frDate(todayKey());
  const list = document.getElementById("list");
  const summary = document.getElementById("summary");

  if (employees.length === 0) {
    summary.innerHTML = "";
    list.innerHTML = `
      <div class="empty">
        <p>Aucun salarié pour l'instant.<br>Ajoute ton équipe pour commencer à pointer.</p>
        <button class="btn-primary" onclick="showSettings()">＋ Ajouter les salariés</button>
      </div>`;
    return;
  }

  const rec = dayRec(todayKey())[currentSlot];
  let nP=0, nR=0, nA=0, nU=0;
  employees.forEach(e => {
    const s = rec[e.id];
    if (s==="present") nP++; else if (s==="retard") nR++; else if (s==="absent") nA++; else nU++;
  });
  summary.innerHTML =
    `<span class="chip p">✓ ${nP}</span>` +
    `<span class="chip r">⏱ ${nR}</span>` +
    `<span class="chip a">✕ ${nA}</span>` +
    (nU ? `<span class="chip u">— ${nU}</span>` : "");

  list.innerHTML = employees.map(e => {
    const s = rec[e.id] || "";
    return `
      <div class="person">
        <div class="name">${escapeHtml(e.name)}</div>
        <div class="actions">
          <button class="${s==="present"?"sel present":""}" onclick="mark('${e.id}','present')">Présent</button>
          <button class="${s==="retard"?"sel retard":""}"  onclick="mark('${e.id}','retard')">Retard</button>
          <button class="${s==="absent"?"sel absent":""}"  onclick="mark('${e.id}','absent')">Absent</button>
        </div>
      </div>`;
  }).join("");
}

/* =========================================================
   ÉCRAN RÉGLAGES (salariés)
   ========================================================= */
function renderSettings() {
  const c = document.getElementById("empList");
  if (employees.length === 0) {
    c.innerHTML = `<p class="hint">La liste est vide. Ajoute un premier salarié ci-dessous.</p>`;
    return;
  }
  c.innerHTML = employees.map(e => `
    <div class="emp-row">
      <input type="text" value="${escapeAttr(e.name)}" onchange="renameEmp('${e.id}', this.value)">
      <button class="del-btn" onclick="delEmp('${e.id}')">🗑</button>
    </div>`).join("");
}
function addEmp() {
  const input = document.getElementById("newEmp");
  const name = input.value.trim();
  if (!name) return;
  employees.push({ id: uid(), name });
  save();
  input.value = "";
  renderSettings();
}
function renameEmp(id, name) {
  const e = employees.find(x => x.id === id);
  if (e) { e.name = name.trim() || e.name; save(); }
}
function delEmp(id) {
  const e = employees.find(x => x.id === id);
  if (!confirm(`Supprimer ${e ? e.name : "ce salarié"} de la liste ?`)) return;
  employees = employees.filter(x => x.id !== id);
  save();
  renderSettings();
}

/* =========================================================
   ÉCRAN HISTORIQUE
   ========================================================= */
function renderHistory() {
  const keys = Object.keys(records).sort().reverse();
  const c = document.getElementById("histList");
  const hint = document.getElementById("histHint");
  if (keys.length === 0) {
    c.innerHTML = "";
    hint.textContent = "Aucune journée enregistrée pour l'instant.";
    return;
  }
  hint.textContent = "Touche une journée pour voir le détail.";
  c.innerHTML = keys.map(k => {
    const counts = slotCounts(k);
    return `
      <div class="hist-day" onclick="showDetail('${k}')">
        <div>
          <div class="d">${frDate(k)}</div>
          <div class="mini">
            <span class="chip p">✓ ${counts.present}</span>
            <span class="chip r">⏱ ${counts.retard}</span>
            <span class="chip a">✕ ${counts.absent}</span>
          </div>
        </div>
        <div style="color:var(--muted); font-size:22px;">›</div>
      </div>`;
  }).join("");
}
// compte un statut une seule fois par personne sur la journée (le pire des deux créneaux : absent > retard > present)
function slotCounts(key) {
  const rec = records[key] || {};
  const out = { present:0, retard:0, absent:0 };
  const rank = { present:1, retard:2, absent:3 };
  const worst = {};
  ["matin","soir"].forEach(sl => {
    Object.entries(rec[sl] || {}).forEach(([id, st]) => {
      if (!worst[id] || rank[st] > rank[worst[id]]) worst[id] = st;
    });
  });
  Object.values(worst).forEach(st => out[st]++);
  return out;
}

function showDetail(key) {
  document.getElementById("detailTitle").textContent = frDate(key);
  const rec = records[key] || { matin:{}, soir:{} };
  const body = document.getElementById("detailBody");
  const labelOf = { present:"Présent", retard:"Retard", absent:"Absent" };

  function slotBlock(title, slot) {
    const data = rec[slot] || {};
    const rows = employees.map(e => {
      const st = data[e.id];
      const cls = st || "none";
      const txt = st ? labelOf[st] : "—";
      return `<div class="detail-row"><span>${escapeHtml(e.name)}</span><span class="badge ${cls}">${txt}</span></div>`;
    }).join("");
    return `<h3>${title}</h3>${rows || '<p class="hint">Aucun salarié.</p>'}`;
  }
  body.innerHTML = slotBlock("☀️ Matin","matin") + slotBlock("🌙 Soir","soir");
  switchScreen("detail");
}

/* ---- Export CSV ---- */
function exportCSV() {
  const keys = Object.keys(records).sort();
  if (keys.length === 0) { alert("Rien à exporter pour l'instant."); return; }
  const labelOf = { present:"Présent", retard:"Retard", absent:"Absent" };
  let rows = [["Date","Salarié","Matin","Soir"]];
  keys.forEach(k => {
    const rec = records[k];
    employees.forEach(e => {
      const m = rec.matin && rec.matin[e.id] ? labelOf[rec.matin[e.id]] : "";
      const s = rec.soir  && rec.soir[e.id]  ? labelOf[rec.soir[e.id]]  : "";
      if (m || s) rows.push([k, e.name, m, s]);
    });
  });
  const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const blob = new Blob(["﻿"+csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pointage_" + todayKey() + ".csv";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function switchScreen(id) {
  ["home","settings","history","detail"].forEach(s => {
    document.getElementById(s).classList.toggle("show", s===id);
  });
  document.getElementById("home").classList.toggle("hide", id!=="home");
  window.scrollTo(0,0);
}
function showHome()     { renderHome();     switchScreen("home"); }
function showSettings() { renderSettings(); switchScreen("settings"); }
function showHistory()  { renderHistory();  switchScreen("history"); }

/* ---- Sécurité affichage ---- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ---- Démarrage ---- */
renderHome();
</script>
</body>
</html>
